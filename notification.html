<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Lost & Found</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-brand"><a href="index.html">🔍 Lost & Found</a></div>
    <a href="dashboard.html" class="btn btn-text">← Dashboard</a>
  </header>

  <main class="container">
    <div class="page-header">
      <h2>Notifications</h2>
    </div>

    <ul class="notification-list">
      <li class="notification-item unread">
        <span class="notif-icon">💬</span>
        <div class="notif-body">
          <p><strong>Alex Miller</strong> sent you a message regarding "Brown Leather Wallet".</p>
          <span class="notif-time">10 minutes ago</span>
        </div>
      </li>
      <li class="notification-item">
        <span class="notif-icon">✋</span>
        <div class="notif-body">
          <p>Someone submitted a claim for your post <strong>"Silver Keys"</strong>.</p>
          <span class="notif-time">2 hours ago</span>
        </div>
      </li>
      <li class="notification-item">
        <span class="notif-icon">✅</span>
        <div class="notif-body">
          <p>Your claim for <strong>"iPhone 14"</strong> was approved.</p>
          <span class="notif-time">1 day ago</span>
        </div>
      </li>
    </ul>
  </main>

</body>
</html>
