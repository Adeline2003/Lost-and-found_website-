<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Lost & Found</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="admin-wrapper">
    <!-- Admin Sidebar -->
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="#" class="active">📊 Overview</a>
        <a href="#">👥 Users Management</a>
        <a href="#">📦 Posts Management</a>
        <a href="#">✋ Claims Review</a>
        <a href="#">🚩 Reports</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <h1>Platform Management</h1>

      <div class="data-table-container">
        <h3>Recent Reports / Fake Posts</h3>
        <table class="data-table">
          <thead>
            <tr>
              <th>Item ID</th>
              <th>Post Title</th>
              <th>Reported By</th>
              <th>Reason</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#1092</td>
              <td>Fake Rolex Watch</td>
              <td>user_44</td>
              <td>Spam / Fake Post</td>
              <td>
                <button class="btn btn-sm btn-danger">Delete Post</button>
                <button class="btn btn-sm btn-text">Dismiss</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

</body>
</html>
